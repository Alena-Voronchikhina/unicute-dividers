<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Click to copy cute Unicode dividers to your clipboard">
    <title>UniCute Dividers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>UniCute Dividers</h1>
        <p class="subtitle">Click to copy the Unicode divider and use it for your notes!</p>
    </header>

    <main>
        <div id="status" class="status" aria-live="polite"></div>
        <div id="dividers-container" class="dividers-container">
            <!-- Dividers will be dynamically rendered here by script.js -->
        </div>
    </main>

    <footer>
        <p>Made with ♡ | <a href="https://github.com" target="_blank" rel="noopener">View on GitHub</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
